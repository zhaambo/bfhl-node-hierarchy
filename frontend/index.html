<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="BFHL Challenge — Process hierarchical node relationships, detect cycles, and visualize trees.">
  <title>BFHL Challenge — Node Hierarchy Processor</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="container">
    <!-- Header -->
    <header class="header">
      <h1>Node Hierarchy Processor</h1>
      <p>Enter edge definitions to build trees, detect cycles, and analyze hierarchies.</p>
    </header>

    <!-- Input Section -->
    <section class="input-section">
      <label for="nodeInput">Edge Definitions</label>
      <textarea
        id="nodeInput"
        placeholder='Enter edges separated by commas or new lines, e.g:&#10;A->B, A->C, B->D&#10;&#10;Or paste a JSON array:&#10;["A->B", "A->C", "B->D"]'
        spellcheck="false"
      ></textarea>
      <div class="input-actions">
        <button class="btn btn-primary" id="submitBtn" onclick="handleSubmit()">
          Process Nodes
        </button>
        <div class="spinner" id="spinner"></div>
        <button class="btn btn-secondary" onclick="loadExample()">
          Load Example
        </button>
        <button class="btn btn-secondary" onclick="clearAll()">
          Clear
        </button>
      </div>
    </section>

    <!-- Error Banner -->
    <div class="error-banner" id="errorBanner"></div>

    <!-- Results -->
    <div class="results" id="results">

      <!-- Summary -->
      <div class="card" id="summaryCard">
        <div class="card-header">
          <span class="icon">📊</span>
          <h3>Summary</h3>
        </div>
        <div class="summary-grid" id="summaryGrid"></div>
      </div>

      <!-- Hierarchies -->
      <div class="card" id="hierarchiesCard">
        <div class="card-header">
          <span class="icon">🌳</span>
          <h3>Hierarchies</h3>
          <span class="badge badge-success" id="hierarchyCount"></span>
        </div>
        <div id="hierarchiesContainer"></div>
      </div>

      <!-- Invalid Entries -->
      <div class="card" id="invalidCard">
        <div class="card-header">
          <span class="icon">⚠️</span>
          <h3>Invalid Entries</h3>
          <span class="badge badge-error" id="invalidCount"></span>
        </div>
        <div id="invalidContainer"></div>
      </div>

      <!-- Duplicate Edges -->
      <div class="card" id="duplicateCard">
        <div class="card-header">
          <span class="icon">🔁</span>
          <h3>Duplicate Edges</h3>
          <span class="badge badge-warning" id="duplicateCount"></span>
        </div>
        <div id="duplicateContainer"></div>
      </div>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
